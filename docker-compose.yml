services:
  medscan.api:
    image: medscanapi
    build:
      context: .
      dockerfile: MedScan.Api/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=medscan;Username=postgres;Password=yourpassword
    depends_on:
      - db

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medscan.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: medscan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:

